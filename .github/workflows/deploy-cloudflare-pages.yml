name: Deploy Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# 部署用排隊而非互相取消：連續 push 時讓 run 依序完成 ，
# 避免後一個 run 取消前一個（被取消的 run 會顯示成失敗）。
concurrency:
  group: pages-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - name: Build
        env:
          VITE_PUBLIC_SUPABASE_URL: ${{ secrets.VITE_PUBLIC_SUPABASE_URL }}
          VITE_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.VITE_PUBLIC_SUPABASE_ANON_KEY }}
        run: npm run build

      - name: Verify build output
        run: |
          echo "::group::out 目錄內容"
          ls -la out
          echo "::endgroup::"
          test -f out/index.html || { echo "::error::out/index.html 不存在，build 沒有產出"; exit 1; }

      # 不透過 wrangler-action：它會吞掉 deploy 的 stderr，看不到真正錯誤。
      # 直接呼叫 wrangler 並 2>&1，讓 Cloudflare API 的錯誤原封不動印在 console。
      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          WRANGLER_LOG: debug
        run: |
          npx -y wrangler@3.90.0 pages deploy out \
            --project-name=goldenyearswebsite \
            --branch=main 2>&1

      - name: 部署失敗時印出 wrangler debug log
        if: failure()
        run: |
          echo "::group::wrangler debug log"
          cat /home/runner/.config/.wrangler/logs/*.log 2>/dev/null || echo "找不到 wrangler log 檔"
          echo "::endgroup::"
