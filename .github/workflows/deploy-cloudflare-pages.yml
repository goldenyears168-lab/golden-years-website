name: Deploy Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# 部署用排隊而非互相取消：連續 push 時讓 run 依序完成。
concurrency:
  group: pages-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          path: golden-years-website

      - uses: actions/checkout@v4
        with:
          repository: goldenyears168-lab/haoshi-erp
          path: haoshi-erp
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version-file: golden-years-website/.nvmrc
          cache-dependency-path: golden-years-website/package-lock.json

      - working-directory: golden-years-website
        run: npm ci

      - name: Build
        working-directory: golden-years-website
        run: npm run build
        env:
          VITE_PUBLIC_SUPABASE_URL: ${{ secrets.VITE_PUBLIC_SUPABASE_URL }}
          VITE_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.VITE_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Verify build output
        run: |
          echo "::group::out 目錄內容"
          ls -la golden-years-website/out
          echo "::endgroup::"
          test -f golden-years-website/out/index.html || { echo "::error::out/index.html 不存在，build 沒有產出"; exit 1; }

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          WRANGLER_LOG: debug
        run: |
          npx -y wrangler@3.90.0 pages deploy golden-years-website/out \
            --project-name=goldenyearswebsite \
            --branch=main 2>&1

      - name: 部署失敗時印出 wrangler debug log
        if: failure()
        run: |
          echo "::group::wrangler debug log"
          cat /home/runner/.config/.wrangler/logs/*.log 2>/dev/null || echo "找不到 wrangler log 檔"
          echo "::endgroup::"
