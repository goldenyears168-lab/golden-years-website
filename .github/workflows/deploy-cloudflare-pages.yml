name: Deploy Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# 部署用排隊而非互相取消：連續 push 時讓 run 依序完成，
# 避免後一個 run 取消前一個（被取消的 run 會顯示成失敗）。
concurrency:
  group: pages-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Verify build output
        run: |
          echo "::group::out 目錄內容"
          ls -la out
          echo "::endgroup::"
          test -f out/index.html || { echo "::error::out/index.html 不存在，build 沒有產出"; exit 1; }

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        env:
          WRANGLER_LOG: debug
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy out --project-name=goldenyearswebsite --branch=main
