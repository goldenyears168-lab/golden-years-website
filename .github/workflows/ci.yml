# 品質檢查：lint + type-check + build
# 部署由 .github/workflows/deploy-cloudflare-pages.yml（push main 時 wrangler deploy）
name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          path: golden-years-website

      - uses: actions/checkout@v4
        with:
          repository: goldenyears168-lab/haoshi-erp
          path: haoshi-erp
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version-file: golden-years-website/.nvmrc
          cache-dependency-path: golden-years-website/package-lock.json

      - working-directory: golden-years-website
        run: npm ci

      - working-directory: golden-years-website
        run: npm run lint

      - working-directory: golden-years-website
        run: npm run type-check

      - name: Build
        working-directory: golden-years-website
        run: npm run build
        env:
          VITE_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          VITE_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
